<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Transport Dashboard</title>
    
    <!-- เรียกใช้ Tailwind CSS เพื่อความสวยงาม -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- เรียกใช้ Google Fonts (Kanit) เพื่อให้อ่านภาษาไทยได้สวยงามสบายตา -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- เรียกใช้ html2canvas สำหรับฟีเจอร์ถ่ายภาพหน้าจอ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #f3f4f6; /* พื้นหลังสีเทาอ่อน */
        }
        /* ตกแต่ง Scrollbar ให้ดูสะอาดตา */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        /* แอนิเมชันสำหรับโหลดดิ้ง */
        .loader {
            border-top-color: #2563eb;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* คลาสพิเศษเวลาแคปหน้าจอ */
        .capture-mode {
            padding: 20px;
            background-color: #ffffff;
        }
    </style>
</head>
<body class="min-h-screen text-gray-800 p-4 md:p-8">

    <div id="main-container" class="max-w-6xl mx-auto">
        
        <!-- ส่วนหัว (Header) -->
        <header class="mb-8 flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <div class="flex items-center gap-4 mb-4 md:mb-0">
                <!-- เปลี่ยนจากไอคอนเดิม เป็นโลโก้ -->
                <div class="w-16 h-16 sm:w-20 sm:h-20 flex-shrink-0 bg-gray-50 rounded-xl overflow-hidden shadow-sm border border-gray-100 p-1 flex items-center justify-center">
                    <!-- ใช้รูปภาพจาก Google Drive (โดยแปลงลิงก์ view ให้เป็น uc?export=view) -->
                    <!-- หมายเหตุ: หากรูปไม่ขึ้น โปรดแน่ใจว่าไฟล์ใน Google Drive ถูกตั้งค่าเป็น 'Anyone with the link' (ทุกคนที่มีลิงก์) -->
                    <img src="https://file.kiwi/9f699400#VLCxdfUfnEmODxPIh02eyg" alt="Company Logo" class="max-w-full max-h-full object-contain" onerror="this.onerror=null; this.src='https://placehold.co/100x100/eeeeee/999999?text=LOGO';">
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">ตารางปฏิบัติงานแผนกจัดส่ง</h1>
                    <p class="text-gray-500 text-sm">อัพเดทข้อมูลอัตโนมัติจากระบบส่วนกลาง</p>
                </div>
            </div>
            <div class="text-right">
                <div id="current-date" class="font-medium text-lg text-blue-800 bg-blue-50 px-4 py-2 rounded-lg border border-blue-100"></div>
            </div>
        </header>

        <!-- สถานะกำลังโหลด (Loading State) -->
        <div id="loading-state" class="flex flex-col items-center justify-center py-20 bg-white rounded-2xl shadow-sm border border-gray-100">
            <div class="loader border-4 border-gray-200 rounded-full w-12 h-12 mb-4"></div>
            <h3 class="text-lg font-medium text-gray-700">กำลังดึงข้อมูลตารางงาน...</h3>
            <p class="text-gray-400 text-sm mt-2">โปรดรอสักครู่ ระบบกำลังเชื่อมต่อ Google Sheets</p>
        </div>

        <!-- สถานะเกิดข้อผิดพลาด (Error State) -->
        <div id="error-state" class="hidden flex flex-col items-center justify-center py-16 bg-red-50 rounded-2xl border border-red-200">
            <svg class="w-16 h-16 text-red-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <h3 class="text-lg font-bold text-red-800">ไม่สามารถโหลดข้อมูลได้</h3>
            <p id="error-message" class="text-red-600 mt-2 text-center px-4"></p>
            <button onclick="fetchData()" class="mt-4 px-6 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition">ลองใหม่อีกครั้ง</button>
        </div>

        <!-- ตารางข้อมูลหลัก (Main Data Table) -->
        <div id="dashboard-content" class="hidden">
            <div class="bg-white rounded-2xl shadow-lg border-2 border-blue-800 overflow-hidden relative" id="capture-area">
                <!-- ขอบเส้นตกแต่งคล้ายกระดาน -->
                <div class="absolute top-0 bottom-0 left-0 w-2 bg-blue-800"></div>
                <div class="absolute top-0 bottom-0 right-0 w-2 bg-blue-800"></div>

                <div class="overflow-x-auto">
                    <table class="w-full border-collapse">
                        <!-- หัวตาราง -->
                        <thead class="bg-blue-800 text-white">
                            <tr>
                                <th class="p-5 border-r-2 border-blue-600 w-1/4 sm:w-1/5 text-center shadow-inner">
                                    <span class="text-xl tracking-wide font-medium">วันที่</span>
                                </th>
                                <th class="p-5 border-r-2 border-blue-600 w-2/5 text-center shadow-inner">
                                    <div class="text-2xl font-bold tracking-wider">Driver</div>
                                    <div class="text-blue-200 font-medium">( พี่ต๋อง )</div>
                                </th>
                                <th class="p-5 w-2/5 text-center shadow-inner">
                                    <div class="text-2xl font-bold tracking-wider">Messenger</div>
                                    <div class="text-blue-200 font-medium">( พี่อ๊อฟ )</div>
                                </th>
                            </tr>
                        </thead>
                        <!-- เนื้อหาตาราง -->
                        <tbody id="table-body">
                            <!-- ข้อมูลจะถูกแทรกที่นี่ด้วย JavaScript -->
                        </tbody>
                    </table>
                </div>
                
                <!-- โลโก้หรือลายน้ำสำหรับตอนเซฟรูป -->
                <div class="hidden print-logo text-right p-3 bg-gray-50 border-t border-gray-200 text-gray-400 text-xs">
                    อัพเดทล่าสุดเมื่อ: <span id="timestamp"></span>
                </div>
            </div>
        </div>

        <!-- ปุ่มสำหรับบันทึกรูปภาพ (Floating Button มุมขวาล่าง) -->
        <button onclick="downloadAsImage()" id="downloadBtn" class="fixed bottom-6 right-6 z-50 hidden flex items-center gap-2 px-6 py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-full shadow-2xl transition-all duration-300 transform hover:-translate-y-1 hover:scale-105 font-medium border-2 border-white">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            <span class="text-lg">เซฟรูปตาราง</span>
        </button>

    </div>

    <script>
        // =========================================================================
        // ตั้งค่า API URL ที่ได้จาก Google Apps Script
        // =========================================================================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyVqv4MPUWc2pKs6AXzUbudiEDqDHVkJZnvKk75WRU9in-v5jFdBAg_adMNrGkSumio/exec";

        // แสดงวันที่ปัจจุบันด้านบน
        const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('th-TH', dateOptions);
        document.getElementById('timestamp').innerText = new Date().toLocaleString('th-TH');

        // ฟังก์ชันเริ่มการทำงาน
        window.onload = () => {
            fetchData();
        };

        // ฟังก์ชันดึงข้อมูลจาก Google Sheets ผ่าน API
        async function fetchData() {
            document.getElementById('loading-state').classList.remove('hidden');
            document.getElementById('error-state').classList.add('hidden');
            document.getElementById('dashboard-content').classList.add('hidden');
            document.getElementById('downloadBtn').classList.add('hidden');

            try {
                const response = await fetch(GAS_URL);
                if (!response.ok) throw new Error("Network response was not ok");
                
                const data = await response.json();
                renderTable(data);
                
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('error-state').classList.remove('hidden');
                document.getElementById('error-message').innerText = "โปรดตรวจสอบ URL ของ Apps Script หรือสิทธิ์การเข้าถึง";
            }
        }

        // ฟังก์ชันจัดการข้อความในแต่ละช่อง (แยกบรรทัด, ทำ Bullet, หรือป้าย OFF)
        function formatCellContent(text) {
            if (!text || text.trim() === "" || text === "undefined") return "";
            
            // เช็คว่าเป็นวันหยุดหรือไม่ (เช็คคำว่า OFF ตัวเล็กหรือใหญ่ก็ได้)
            if (text.trim().toUpperCase() === "OFF") {
                return `
                    <div class="h-full flex items-center justify-center p-4">
                        <div class="relative transform -rotate-12 border-4 border-red-500 rounded-lg px-6 py-2 bg-red-50 opacity-90">
                            <span class="text-4xl font-extrabold text-red-600 tracking-widest drop-shadow-sm">OFF</span>
                        </div>
                    </div>
                `;
            }

            // แยกข้อความด้วยการขึ้นบรรทัดใหม่
            const lines = text.split('\n').filter(line => line.trim() !== '');
            let html = '<ul class="space-y-3 p-2">';
            
            lines.forEach(line => {
                // ลบขีด (-) ด้านหน้าออกถ้าผู้ใช้พิมพ์มาซ้ำ
                const cleanText = line.replace(/^-\s*/, '').trim();
                html += `
                    <li class="flex items-start">
                        <span class="text-blue-600 mr-3 mt-1 font-black text-lg leading-none">-</span>
                        <span class="text-gray-800 font-medium text-base md:text-lg leading-snug">${cleanText}</span>
                    </li>
                `;
            });
            html += '</ul>';
            return html;
        }

        // ฟังก์ชันวาดตาราง
        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = "";

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" class="p-8 text-center text-gray-500">ยังไม่มีข้อมูลในตาราง</td></tr>`;
            } else {
                data.forEach((row, index) => {
                    const isEven = index % 2 === 0;
                    const bgClass = isEven ? 'bg-white' : 'bg-blue-50/50'; // สลับสีแถวให้ดูง่าย
                    const dateText = (row.date && row.date !== "undefined") ? row.date : "";
                    
                    const tr = document.createElement('tr');
                    tr.className = `${bgClass} border-b-2 border-blue-100 hover:bg-yellow-50 transition-colors duration-200 group`;
                    
                    tr.innerHTML = `
                        <td class="p-4 border-r-2 border-blue-100 align-top text-center relative">
                            <div class="font-bold text-lg text-blue-900 mt-2">${dateText}</div>
                            <!-- เส้นทองคั่นตกแต่งแบบในรูปไวท์บอร์ด -->
                            <div class="absolute bottom-0 right-[-2px] w-1 h-full bg-yellow-400 group-hover:bg-yellow-500 transition-colors"></div>
                        </td>
                        <td class="p-4 border-r-2 border-blue-100 align-top">
                            ${formatCellContent(row.driver_tasks)}
                        </td>
                        <td class="p-4 align-top">
                            ${formatCellContent(row.messenger_tasks)}
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }

            // สลับการแสดงผลหน้าจอ
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('dashboard-content').classList.remove('hidden');
            document.getElementById('downloadBtn').classList.remove('hidden');
        }

        // ฟังก์ชันสำหรับแคปหน้าจอและเซฟรูปภาพ
        function downloadAsImage() {
            const btn = document.getElementById('downloadBtn');
            const captureArea = document.getElementById('capture-area');
            const watermark = captureArea.querySelector('.print-logo');
            
            const originalContent = btn.innerHTML;
            
            // เปลี่ยนสถานะปุ่ม
            btn.innerHTML = `<svg class="animate-spin -ml-1 mr-2 h-6 w-6 text-white inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> <span class="text-lg">กำลังประมวลผล...</span>`;
            btn.classList.add('cursor-wait');

            // อัพเดทเวลา
            document.getElementById('timestamp').innerText = new Date().toLocaleString('th-TH');

            setTimeout(() => {
                // ซ่อนปุ่ม และจัดเตรียมพื้นที่ให้สวยงามก่อนถ่ายภาพ
                btn.style.display = 'none'; 
                watermark.classList.remove('hidden'); // แสดงเวลาที่อัพเดทรูปล่างตาราง
                captureArea.classList.add('capture-mode'); // เพิ่ม padding สีขาว
                captureArea.style.borderRadius = '0'; // ลบมุมโค้งเพื่อภาพที่เต็มกรอบ
                
                html2canvas(captureArea, {
                    scale: 2, // ความคมชัด 2 เท่า (Retina Display)
                    backgroundColor: "#ffffff",
                    useCORS: true,
                    logging: false,
                    windowWidth: 1200 // ล็อกความกว้างจำลองเพื่อป้องกันเลย์เอาต์มือถือเพี้ยน
                }).then(canvas => {
                    const imageURI = canvas.toDataURL("image/jpeg", 0.9); // เซฟเป็น JPG คุณภาพสูงเพื่อไฟล์ไม่ใหญ่เกิน
                    
                    const link = document.createElement('a');
                    const dateStr = new Date().toLocaleDateString('th-TH').replace(/\//g, '-');
                    link.download = `ตารางขนส่ง_${dateStr}.jpg`;
                    
                    link.href = imageURI;
                    link.click();
                    
                    showNotification("บันทึกรูปภาพสำเร็จ!", "success");

                }).catch(err => {
                    console.error("Capture error:", err);
                    showNotification("เกิดข้อผิดพลาดในการบันทึกรูปภาพ", "error");
                }).finally(() => {
                    // คืนค่า UI กลับสู่โหมดหน้าเว็บปกติ
                    btn.style.display = 'flex';
                    btn.innerHTML = originalContent;
                    btn.classList.remove('cursor-wait');
                    watermark.classList.add('hidden');
                    captureArea.classList.remove('capture-mode');
                    captureArea.style.borderRadius = '1rem';
                });
            }, 300);
        }

        // ฟังก์ชันแสดงการแจ้งเตือนสวยๆ (แทน alert)
        function showNotification(message, type = "success") {
            const notif = document.createElement('div');
            const bgColor = type === "success" ? "bg-green-500" : "bg-red-500";
            notif.className = `fixed top-6 right-6 ${bgColor} text-white px-6 py-4 rounded-xl shadow-2xl z-50 transform transition-all duration-500 translate-x-10 opacity-0 font-medium flex items-center gap-3`;
            
            const icon = type === "success" 
                ? `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`
                : `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>`;

            notif.innerHTML = `${icon} <span>${message}</span>`;
            document.body.appendChild(notif);

            // Animate In
            setTimeout(() => {
                notif.classList.remove('translate-x-10', 'opacity-0');
            }, 50);

            // Animate Out & Remove
            setTimeout(() => {
                notif.classList.add('translate-x-10', 'opacity-0');
                setTimeout(() => notif.remove(), 500);
            }, 3000);
        }
    </script>
</body>
</html>
